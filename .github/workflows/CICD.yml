name: CI/CD

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Start Firestore emulator
        run: firebase emulators:start --only firestore --project test-project &
      - name: Wait for Firestore emulator
        run: timeout 60 bash -c 'until curl -sf http://localhost:8080; do sleep 2; done'
      - name: Build test image
        run: ./build.sh --build-only --builder retrograde-test-builder
      - name: Run clippy
        run: podman run --rm retrograde-test-builder cargo clippy --all-features -- -Dwarnings
      - name: Run tests
        run: podman run --rm --network host -e FIRESTORE_EMULATOR_HOST=localhost:8080 retrograde-test-builder cargo test -- --include-ignored

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.ref == 'refs/heads/master'"
    env:
      IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/retrograde/retrograde:latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: "${{ secrets.GCP_ACCOUNT_CREDENTIALS }}"
      - uses: google-github-actions/setup-gcloud@v1
      - name: Buildah build
        run: buildah unshare ./build.sh --image $IMAGE
      - name: Buildah push
        run: |
          gcloud auth print-access-token | buildah login -u oauth2accesstoken --password-stdin us-east1-docker.pkg.dev
          buildah push $IMAGE
      - name: Deploy new cloudrun revision
        run: gcloud run deploy retrotools --image $IMAGE --platform managed --region=us-east1 --project=${{ secrets.GCP_PROJECT }}

  deploy-firestore-rules:
    runs-on: ubuntu-latest
    needs: ci
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.ref == 'refs/heads/master'"
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: "${{ secrets.GCP_ACCOUNT_CREDENTIALS }}"
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project ${{ secrets.GCP_PROJECT }}
